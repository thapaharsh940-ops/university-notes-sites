<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Notes Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="logo">📘 UniNotes</span>
            <button id="sidebar-toggle">☰</button>
        </div>
        <ul class="nav-list">
            <li class="nav-item" onclick="showDashboard('overview')">📊 Dashboard</li>
            <li class="nav-item" onclick="showDashboard('allBranches')">📚 Browse</li>
            <li class="nav-item" onclick="showDashboard('search')">🔍 Search</li>
            <li class="nav-item" onclick="showDashboard('myUploads')">📤 My Uploads</li>
            <li class="nav-item" onclick="showDashboard('savedNotes')">🔖 Saved Notes</li> <li class="nav-item danger" onclick="logout()">🚪 Logout</li>
        </ul>
    </nav>

    <div class="main-content">
        <header>
            <button id="mobile-menu-btn">☰</button>
            <span id="header-title">University Notes</span>
            <span id="user-bar"></span>
        </header>
        
        <div id="modal-bg" class="modal-bg"></div>
        <div id="auth-modal" class="modal-content small"></div>
        <div id="preview-modal" class="modal-content"></div>
        <div id="admin-modal" class="modal-content small"></div>
        
        <main id="dashboard-main">
            <section id="overview" class="dashboard-section active">
                <h2>Dashboard Overview</h2>
                
                <div id="recent-views-container" style="display:none; margin-bottom: 2em;">
                    <h3>🕒 Recently Viewed</h3>
                    <div id="recentViews" class="stats-row"></div>
                </div>

                <div class="stats-row">
                    <div class="stat-card"><h4>Total Docs</h4><div id="totalDocs">0</div></div>
                    <div class="stat-card"><h4>Monthly</h4><div id="monthlyUploads">0</div></div>
                    <div class="stat-card"><h4>Today</h4><div id="todayUploads">0</div></div>
                    <div class="stat-card"><h4>My Uploads</h4><div id="myUploadsCount">0</div></div>
                </div>

                <div style="display: flex; gap: 2em; flex-wrap: wrap; margin-top: 2em;">
                    <div style="flex: 1; min-width: 300px;">
                        <h3>Activity Log</h3>
                        <ul id="activity-log" class="activity-list"></ul>
                    </div>
                    <div style="flex: 1; min-width: 300px;">
                        <h3>🏆 Top Contributors</h3>
                        <ul id="leaderboard-list" class="activity-list"></ul>
                    </div>
                </div>
            </section>
            
            <section id="allBranches" class="dashboard-section"></section>
            <section id="branchDetail" class="dashboard-section"></section>
            <section id="semesterDetail" class="dashboard-section"></section>
            <section id="sectionDetail" class="dashboard-section"></section>
            <section id="subjectDetail" class="dashboard-section"></section>
            <section id="search" class="dashboard-section">
                <h2>Search</h2>







                
                <div id="searchSection" class="dashboard-section"></div>
                <input id="searchInput" class="search-box" placeholder="Search..." autocomplete="off">
                <div id="subjectResults"></div>
                <div id="searchResults"></div>
            </section>
            <section id="myUploads" class="dashboard-section"></section>
            
            <section id="savedNotes" class="dashboard-section">
                <h2>🔖 Saved Notes</h2>
                <div id="savedNotesList"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="app.js"></script>
</body>
</html>
