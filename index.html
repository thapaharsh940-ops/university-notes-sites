<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Notes Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-header">
        <h2 style="margin: 0; font-size: 1.2em;">🎓 University Notes</h2>
        <button id="mobile-menu-btn" class="hamburger">☰</button>
    </div>

    <nav id="sidebar" class="sidebar closed">
        <div class="sidebar-header" style="padding: 20px; font-size: 1.5em; font-weight: bold; color: white; border-bottom: 1px solid #374151;">
            <span class="logo">📘 UniNotes</span>
        </div>
        
        <ul class="nav-list" style="display:flex; flex-direction:column; height: 100%; margin: 0; padding-top: 10px;">
            <div style="padding: 10px 20px; font-size: 0.75em; color: #6b7280; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">
                Notes System
            </div>
            <li class="nav-item" onclick="showDashboard('overview')">📊 Notes Dashboard</li>
            <li class="nav-item" onclick="showDashboard('allBranches')">📚 Browse Notes</li>
            <li class="nav-item" onclick="showDashboard('searchSection')">🔍 Search Notes</li>
            <li class="nav-item" onclick="showDashboard('myUploads')">📤 My Uploads</li>
            <li class="nav-item" onclick="showDashboard('savedNotes')">🔖 Saved Notes</li>
            
            <div style="margin-top: 15px; padding: 10px 20px; font-size: 0.75em; color: #6b7280; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; border-top: 1px solid #374151; padding-top: 20px;">
                Workstation
            </div>
            <li class="nav-item" onclick="showDashboard('workstationHome')" style="color: #48bb78; font-weight: bold;">📝 Assignments</li>
            
            <div style="margin-top: auto; padding: 20px;">
                <div id="user-bar" style="color: #9ca3af; margin-bottom: 10px; font-size: 0.9em;">Not logged in</div>
                <li class="nav-item login-btn" onclick="showAuthModal('login')" style="list-style: none;">🔑 Login</li>
            </div>
        </ul>
    </nav>

    <div class="main-content">
        <div id="modal-bg" class="modal-bg"></div>
        <div id="auth-modal" class="modal-content small"></div>
        <div id="preview-modal" class="modal-content"></div>
        <div id="admin-modal" class="modal-content small"></div>

        <div id="loading-screen" class="loading-overlay">
            <div class="spinner"></div>
            <h2 id="loading-text" style="color: white; margin: 0;">Uploading File...</h2>
            <p style="color: #9ca3af; margin-top: 10px;">Please wait and do not close this page.</p>
        </div>
        
        <main id="dashboard-main">
            <section id="overview" class="dashboard-section active"></section>
            <section id="allBranches" class="dashboard-section"></section>
            <section id="branchDetail" class="dashboard-section"></section>
            <section id="batchDetail" class="dashboard-section"></section>
            <section id="semesterDetail" class="dashboard-section"></section>
            <section id="sectionDetail" class="dashboard-section"></section> 
            <section id="subjectDetail" class="dashboard-section"></section>
            <section id="searchSection" class="dashboard-section"></section>
            <section id="myUploads" class="dashboard-section"></section>
            <section id="savedNotes" class="dashboard-section"><h2>🔖 Saved Notes</h2><div id="savedNotesList"></div></section>

            <section id="workstationHome" class="dashboard-section"></section>
            <section id="wsBranchDetail" class="dashboard-section"></section>
            <section id="workstationUpload" class="dashboard-section"></section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="app.js"></script>
</body>
</html>
